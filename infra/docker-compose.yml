services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: site_management
      POSTGRES_USER: site_user
      POSTGRES_PASSWORD: site_password
    ports:
      - "55432:5432"
    volumes:
      - site_management_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U site_user -d site_management"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - site_management_minio:/data

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install --workspaces=false --package-lock=false --ignore-scripts && npm --workspace @site-management/api run build && npm --workspace @site-management/api run start"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgresql://site_user:site_password@postgres:5432/site_management
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: site-management
      JWT_SECRET: site-management-dev-secret
    ports:
      - "4000:4000"
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis
      - minio

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "npm install --workspaces=false --package-lock=false --ignore-scripts && npm --workspace @site-management/web run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspace
    depends_on:
      - api

volumes:
  site_management_postgres:
  site_management_minio:
